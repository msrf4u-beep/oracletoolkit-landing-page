<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Login | OracleToolkit</title><link rel="icon" href="favicon.ico" sizes="any"><meta name="robots" content="noindex,follow"><style>
body{margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f8fafc;color:#0f172a}.wrap{min-height:100vh;display:grid;place-items:center;padding:28px}.card{max-width:560px;width:100%;background:white;border:1px solid #dbe3ef;border-radius:24px;padding:28px;box-shadow:0 18px 45px rgba(15,23,42,.08)}h1{color:#0A2040;font-size:36px;margin:0 0 10px;letter-spacing:-.04em}p{color:#64748b}button,a{display:inline-flex;padding:12px 18px;border-radius:12px;font-weight:900;text-decoration:none;border:0;cursor:pointer}.primary{background:#0A2040;color:white}.secondary{background:white;color:#0A2040;border:1px solid #dbe3ef}.actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px}</style></head><body><main class="wrap"><section class="card"><h1>Sign in to OracleToolkit</h1><p>Access your cloud-saved Project Memory workspace.</p><div class="actions"><button id="login" class="primary">Continue to Login</button><a class="secondary" href="index.html">Back to Homepage</a></div><p id="status">Loading authentication...</p></section></main><script async crossorigin="anonymous" data-clerk-publishable-key="pk_live_Y2xlcmsub3JhY2xldG9vbGtpdC5jb20k" src="https://clerk.black-swan-25.clerk.accounts.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js"></script><script>
const wait=ms=>new Promise(r=>setTimeout(r,ms));async function getClerk(){for(let i=0;i<60;i++){if(window.Clerk?.load){await window.Clerk.load();return window.Clerk}await wait(250)}throw new Error("Clerk not loaded")}
async function openLogin(){try{const c=await getClerk();if(c.user){location.href="workspace.html";return}document.getElementById("status").textContent="Opening secure login...";c.openSignIn({afterSignInUrl:location.origin+"/workspace.html",afterSignUpUrl:location.origin+"/workspace.html",redirectUrl:location.origin+"/workspace.html"})}catch(e){document.getElementById("status").textContent="Authentication could not load. Please refresh."}}
document.getElementById("login").onclick=openLogin;document.addEventListener("DOMContentLoaded",openLogin);
</script></body></html>
