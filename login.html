<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | OracleToolkit</title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <meta name="robots" content="noindex, follow">
  <script async crossorigin="anonymous" data-clerk-publishable-key="pk_live_Y2xlcmsub3JhY2xldG9vbGtpdC5jb20k" src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js" type="text/javascript"></script>
  <style>
    :root{--navy:#0A2040;--line:#dbe3ef;--muted:#64748b;--bg:#f8fafc}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(135deg,#f8fafc,#eef6ff);color:#0f172a}
    .wrap{min-height:100vh;display:grid;place-items:center;padding:28px} .card{width:100%;max-width:520px;background:white;border:1px solid var(--line);border-radius:26px;padding:30px;box-shadow:0 24px 70px rgba(15,23,42,.10)}
    .brand{display:flex;align-items:center;gap:10px;font-weight:900;color:var(--navy);margin-bottom:22px} .brand svg{width:40px;height:40px}
    h1{margin:0 0 8px;color:var(--navy);font-size:32px;letter-spacing:-.04em} p{margin:0 0 22px;color:var(--muted);line-height:1.55}
    button,a{width:100%;display:inline-flex;justify-content:center;border-radius:14px;font-size:15px;padding:13px 14px;font-weight:900;text-decoration:none;cursor:pointer}
    button{border:0;background:var(--navy);color:white} a{background:white;color:var(--navy);border:1px solid var(--line);margin-top:10px}
    #status{margin-top:14px;font-size:14px;color:#334155;min-height:22px} .safe{font-size:12px;color:#64748b;background:#f8fafc;border:1px solid var(--line);padding:12px;border-radius:14px;margin-top:18px}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="brand"><svg viewBox="0 0 96 96" aria-hidden="true"><rect x="6" y="6" width="84" height="84" rx="22" fill="#0A2040"></rect><rect x="13" y="13" width="70" height="70" rx="17" fill="none" stroke="#CBD5E1" stroke-width="5"></rect><text x="48" y="58" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="800" fill="#F8FAFC">OT</text></svg><span>OracleToolkit</span></div>
      <h1>Sign in to OracleToolkit</h1>
      <p>Use the secure Clerk login screen to access the member workspace.</p>
      <button id="open-clerk" type="button">Login / Sign Up</button>
      <a href="index.html">Back to homepage</a>
      <div id="status">Loading authentication...</div>
      <div class="safe">Enterprise-safe guidance: do not upload production PHI, PII, SPI, payroll, patient, or supplier banking data.</div>
    </section>
  </main>
  <script>
    var clerkReady = false;
    function status(msg){ var el=document.getElementById('status'); if(el) el.textContent=msg; }
    async function loadClerk(){
      if(!window.Clerk){ status('Authentication is still loading. Please wait a moment.'); return false; }
      if(!clerkReady){ await window.Clerk.load(); clerkReady = true; }
      if(window.Clerk.user){ window.location.href='workspace.html'; return true; }
      status('Ready.'); return true;
    }
    async function openClerk(){
      try{
        sessionStorage.setItem('ot_login_intent','workspace');
        var ok = await loadClerk(); if(!ok) return;
        if(window.Clerk.user){ window.location.href='workspace.html'; return; }
        window.Clerk.openSignIn({ afterSignInUrl: window.location.origin + '/workspace.html', afterSignUpUrl: window.location.origin + '/workspace.html' });
      }catch(e){ console.error(e); status('Login temporarily unavailable. Please refresh and try again.'); }
    }
    document.getElementById('open-clerk').addEventListener('click', openClerk);
    window.addEventListener('load', async function(){ await loadClerk(); });
  </script>
</body>
</html>
